name: ci
# Copyright © 2026 Colleen Townsend

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ccf
          POSTGRES_PASSWORD: ccf
          POSTGRES_DB: ccf_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ccf"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      CCF_DATABASE_URL: postgresql+asyncpg://ccf:ccf@localhost:5432/ccf_test
      CCF_DATABASE_URL_SYNC: postgresql+psycopg://ccf:ccf@localhost:5432/ccf_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - run: pip install -U pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy src
      - run: pytest -q --cov=ccf --cov-report=term-missing

  supply-chain:
    name: sbom + vuln scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -U pip cyclonedx-bom pip-audit
      - run: pip install -e .
      - name: Generate SBOM
        run: cyclonedx-py environment -o sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
      - name: pip-audit
        run: pip-audit --strict --ignore-vuln PYSEC-0000-0 || true
      - name: Trivy fs scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ccf:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
